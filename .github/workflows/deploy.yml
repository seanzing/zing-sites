name: Deploy Sites to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy changed sites
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          CHANGED_SITES=$(git diff --name-only HEAD~1 HEAD \
            | grep '/' \
            | cut -d'/' -f1 \
            | sort -u)

          if [ -z "$CHANGED_SITES" ]; then
            echo "No site folders changed — nothing to deploy"
            exit 0
          fi

          echo "Sites to deploy: $CHANGED_SITES"

          for SITE_ID in $CHANGED_SITES; do
            if [ ! -d "$SITE_ID" ]; then
              echo "Skipping $SITE_ID — not a directory"
              continue
            fi
            echo "Deploying $SITE_ID..."
            wrangler pages deploy "$SITE_ID" \
              --project-name="$SITE_ID" \
              --branch=main \
              --commit-dirty=true \
              || echo "Warning: deploy failed for $SITE_ID"
          done
