name: Deploy Changed Sites
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed site directories
        id: changed
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            changed=$(git diff --name-only HEAD~1 HEAD | grep '/' | cut -d'/' -f1 | sort -u | tr '\n' ' ')
          else
            changed=$(git ls-files | grep '/' | cut -d'/' -f1 | sort -u | tr '\n' ' ')
          fi
          echo "sites=$changed" >> $GITHUB_OUTPUT
          echo "Changed sites: $changed"

      - name: Install Wrangler
        if: steps.changed.outputs.sites != ''
        run: npm install -g wrangler

      - name: Deploy changed sites
        if: steps.changed.outputs.sites != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for site in ${{ steps.changed.outputs.sites }}; do
            if [ -d "$site" ]; then
              echo "Deploying $site..."
              curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                -H "Content-Type: application/json" \
                --data "{\"name\":\"$site\",\"production_branch\":\"main\"}" > /dev/null 2>&1 || true
              npx wrangler pages deploy $site --project-name $site --commit-dirty=true
              echo "✅ Deployed $site"
            fi
          done
